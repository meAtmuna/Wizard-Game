<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <div class="start-panel">
            <h1>Wizard Potion Hunt</h1>
            <p>Collect 2 magical potions and survive.</p>
            <button id="start-btn">Start Game</button>
        </div>
    </div>
    <div id="game-container">
        <div class="game-info">
            <h2 id="potions-collected">Potions Collected: 0</h2>
            <p> you have to collect the 2 potions to win, use Arrow keys / WASD to move</p>
        </div>

        <canvas id="canvas"></canvas>

        <img src="./Pellet Town.png" id="background" hidden>
        <img src="./potion.png" id="potion" hidden>
        <img src="./wizard.png" id="wizard" hidden>
    </div>
    <script src="./app.js"></script>
</body>
</html>
